server {
    listen __PORT__;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_static on;   # serve pre-compressed .gz files produced by dotnet publish
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Blazor WASM MIME types ────────────────────────────────────────────────
    types {
        application/wasm                  wasm;
        application/octet-stream          dat;
        application/octet-stream          blat;
        text/html                         html htm;
        text/css                          css;
        application/javascript            js;
        image/png                         png;
        image/svg+xml                     svg;
        font/woff2                        woff2;
        application/json                  json;
        application/manifest+json         webmanifest;
    }

    # ── Cache static Blazor assets aggressively ───────────────────────────────
    location ~* \.(wasm|dll|dat|blat)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|woff2|png|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback — all unmatched paths serve index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
